global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: http://localhost:9090/api/v1/write

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
