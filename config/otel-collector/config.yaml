receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - key: service.instance.id
        from_attribute: host.name
        action: insert

  # Transform SeverityText to lowercase for Grafana compatibility
  transform/lowercase_severity:
    log_statements:
      - context: log
        statements:
          - set(severity_text, "trace") where severity_text == "Trace"
          - set(severity_text, "debug") where severity_text == "Debug"
          - set(severity_text, "info") where severity_text == "Information"
          - set(severity_text, "warn") where severity_text == "Warning"
          - set(severity_text, "error") where severity_text == "Error"
          - set(severity_text, "fatal") where severity_text == "Fatal"
          - set(severity_text, "critical") where severity_text == "Critical"

exporters:
  # Seq (OTLP)
  otlphttp/seq:
    endpoint: http://seq:5341/ingest/otlp
    tls:
      insecure: true

  # Loki (OTLP)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Elasticsearch
  elasticsearch:
    endpoints:
      - http://elasticsearch:9200
    logs_index: dotnet-logs
    sending_queue:
      enabled: true
      num_consumers: 20
      queue_size: 1000

  # Tempo (Traces)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug (optional - for troubleshooting)
  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch, resource, transform/lowercase_severity]
      exporters: [otlphttp/seq, otlphttp/loki, elasticsearch]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
